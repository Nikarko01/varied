_niveau": 2, "typ": "open", "frage": "Erläutern Sie das 3-Phasen-Modell von Kurt Lewin und beschreiben Sie, wie es auf ein Digitalisierungsprojekt in einem Maschinenbauunternehmen angewendet werden kann.", "musterloesung": ["Phase 1 - Auftauen (Unfreezing): Bereitschaft zur Veränderung erzeugen - bestehende Strukturen und Gewohnheiten hinterfragen. Anwendung: Mitarbeiter über Notwendigkeit der Digitalisierung informieren, Status quo kritisch analysieren, Dringlichkeit kommunizieren.", "Phase 2 - Bewegen/Verändern (Moving): Die Veränderung durchführen - neue Prozesse, Systeme, Verhaltensweisen einführen. Anwendung: Neue Software einführen, Mitarbeiter schulen, Prozesse anpassen, Pilotprojekte starten.", "Phase 3 - Einfrieren (Refreezing): Neue Strukturen stabilisieren und dauerhaft verankern. Anwendung: Neue Prozesse in Standards und Stellenbeschreibungen integrieren, Erfolge sichtbar machen, Lessons Learned durchführen.", "Wichtig: Die 'Auftau'-Phase wird in der Praxis oft unterschätzt - wer Widerstände ignoriert, scheitert in Phase 2.", "Grenzen des Modells: In der heutigen VUCA-Welt sind Veränderungen nicht sequenziell - das Modell eignet sich besser für planbare Transformationen."], "begruendung": "Change-Management-Modelle sind Pflichtthema ICB 4.0 Practice 5.13.", "schwierigkeit": "mittel", "quelle_klausur": "Probeklausur 5"}];
const STORAGE_KEY = 'ipma_leveld_trainer_history_v1';

// Labels und Einheiten fuer Rechenaufgaben
const GIVEN_MAP = {
  a_optimistisch: { label: 'a (optimistisch)', unit: 'Tage' },
  m_wahrscheinlichst: { label: 'm (wahrscheinlich)', unit: 'Tage' },
  b_pessimistisch: { label: 'b (pessimistisch)', unit: 'Tage' },
  BAC: { label: 'BAC (Budget at Completion)', unit: 'EUR' },
  BCWS_PV: { label: 'BCWS / PV (Planned Value)', unit: 'EUR' },
  BCWP_EV: { label: 'BCWP / EV (Earned Value)', unit: 'EUR' },
  ACWP_AC: { label: 'ACWP / AC (Actual Cost)', unit: 'EUR' },
  EAC: { label: 'EAC', unit: 'EUR' },
  ETC: { label: 'ETC', unit: 'EUR' },
};

function fmtNumber(val) {
  if (typeof val !== 'number') return String(val);
  return val.toLocaleString('de-DE');
}

function fmtGiven(key, val) {
  const meta = GIVEN_MAP[key];
  const label = meta ? meta.label : key.replaceAll('_', ' / ');
  let unit = meta ? meta.unit : '';
  // Heuristik: keine Einheit aber Geldbetrag-typischer Key
  if (!meta && /^(BAC|BCWS|BCWP|ACWP|PV|EV|AC|EAC|ETC|CV|SV)$/.test(key)) unit = 'EUR';
  let valStr;
  if (typeof val === 'number') {
    valStr = fmtNumber(val);
    if (unit === 'EUR') valStr += ' €';      // 500.000 €
    else if (unit === 'Tage') valStr += ' Tage';
    else if (unit) valStr += ' ' + unit;
  } else {
    valStr = String(val);
  }
  return { label, valStr };
}

// Pool mischen
let pool = QUESTIONS.slice();
for (let i = pool.length - 1; i > 0; i--) {
  const j = Math.floor(Math.random() * (i + 1));
  [pool[i], pool[j]] = [pool[j], pool[i]];
}
const ORIGINAL_POOL_SIZE = pool.length;

const state = {
  name: '',
  index: 0,
  score: 0,
  answered: 0,
  results: [],  // pro Frage: {id, bereich, element, typ, status}
  reviewRound: false,
};

const $ = (id) => document.getElementById(id);
const startArea = $('start-area');
const topbar = $('topbar');
const nameChip = $('name-chip');
const progressText = $('progress-text');
const progressFill = $('progress-fill');
const scoreText = $('score-text');
const questionArea = $('question-area');
const endArea = $('end-area');

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function typLabel(typ) {
  if (typ === 'single_choice') return 'Single Choice';
  if (typ === 'multiple_choice') return 'Multiple Choice';
  if (typ === 'open') return 'Offen';
  if (typ === 'open_rechnung') return 'Rechnung';
  return typ;
}

// === START-SCREEN ===
function renderStart() {
  startArea.innerHTML = `
    <div class="card start-card">
      <h2>Bereit fuer die Pruefungssimulation?</h2>
      <p>56 Fragen aus allen 28 ICB4-Kompetenzelementen. Mix aus Single Choice, offenen Fragen und zwei Rechenaufgaben (PERT und Earned Value Analysis).</p>
      <ul>
        <li>Bei Single Choice: Antwort waehlen, pruefen.</li>
        <li>Bei offenen Fragen: deine Antwort tippen, mit der Musterloesung vergleichen, ehrlich einschaetzen.</li>
        <li>Nicht weiter? Frage einfach ueberspringen.</li>
        <li>Am Ende bekommst du deine persoenliche Auswertung.</li>
      </ul>
      <label for="name-input">Dein Name (oder Kuerzel)</label>
      <input type="text" id="name-input" placeholder="z.B. Tim, Andi M., Tester 3 ..." maxlength="40" autocomplete="off" />
      <div class="actions">
        <button class="btn" id="start-btn">Simulation starten</button>
      </div>
    </div>
  `;
  const input = $('name-input');
  const btn = $('start-btn');
  input.focus();
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') btn.click(); });
  btn.addEventListener('click', () => {
    const val = input.value.trim() || 'Teilnehmer';
    state.name = val;
    nameChip.textContent = val;
    startArea.innerHTML = '';
    topbar.style.display = 'flex';
    renderQuestion();
  });
}

// === FRAGEN-RENDERING ===
function updateProgress() {
  const total = pool.length;
  const prefix = state.reviewRound ? 'Wiederholung' : 'Frage';
  progressText.textContent = `${prefix} ${Math.min(state.index + 1, total)} / ${total}`;
  progressFill.style.width = (state.index / total * 100) + '%';
  scoreText.textContent = `${state.score} / ${state.answered}`;
}

function renderQuestion() {
  if (state.index >= pool.length) { maybeOfferSkipReview(); return; }
  updateProgress();
  const q = pool[state.index];
  const isMC = q.typ === 'single_choice' || q.typ === 'multiple_choice';

  let optionenHtml = '';
  if (isMC && q.optionen) {
    optionenHtml = '<ul class="optionen" id="optionen-list">' +
      Object.entries(q.optionen).map(([k, v]) =>
        `<li data-key="${k}"><span class="letter">${k}</span><span>${escapeHtml(v)}</span></li>`
      ).join('') + '</ul>';
  } else {
    optionenHtml = '<textarea class="eigenantwort" id="eigenantwort" placeholder="Deine Antwort (zum Selbstvergleich) ..."></textarea>';
  }

  let gegebenHtml = '';
  if (q.gegeben) {
    const zeilen = Object.entries(q.gegeben).map(([k, v]) => {
      const { label, valStr } = fmtGiven(k, v);
      return `<div class="zeile"><span class="key">${escapeHtml(label)}</span><span class="val">${escapeHtml(valStr)}</span></div>`;
    }).join('');
    gegebenHtml = `<div class="gegeben"><div class="titel">Gegeben</div>${zeilen}</div>`;
  }

  questionArea.innerHTML = `
    <div class="card">
      <div class="meta">
        <span class="tag element">${q.icb4_element} ${escapeHtml(q.icb4_bezeichnung)}</span>
        <span class="tag type">${typLabel(q.typ)}</span>
        <span class="tag bloom">Bloom ${q.bloom_niveau}</span>
      </div>
      <p class="frage">${escapeHtml(q.frage)}</p>
      ${gegebenHtml}
      ${optionenHtml}
      <div class="actions">
        <button class="btn" id="check-btn">${isMC ? 'Antwort pruefen' : 'Musterloesung zeigen'}</button>
        <button class="btn secondary" id="skip-btn">Ueberspringen</button>
      </div>
      <div id="feedback-slot"></div>
    </div>
  `;

  if (isMC) wireMC(q); else wireOpen(q);
  $('skip-btn').addEventListener('click', () => {
    recordResult(q, 'skipped');
    nextQuestion();
  });
}

let mcSelected = new Set();
function wireMC(q) {
  mcSelected = new Set();
  const list = $('optionen-list');
  const isMulti = q.typ === 'multiple_choice';
  list.querySelectorAll('li').forEach(li => {
    li.addEventListener('click', () => {
      if (li.classList.contains('disabled')) return;
      const k = li.dataset.key;
      if (isMulti) {
        if (mcSelected.has(k)) { mcSelected.delete(k); li.classList.remove('selected'); }
        else { mcSelected.add(k); li.classList.add('selected'); }
      } else {
        list.querySelectorAll('li').forEach(x => x.classList.remove('selected'));
        mcSelected = new Set([k]);
        li.classList.add('selected');
      }
    });
  });
  $('check-btn').addEventListener('click', () => checkMC(q));
}

function checkMC(q) {
  if (mcSelected.size === 0) { alert('Bitte erst eine Antwort waehlen.'); return; }
  const correct = String(q.richtige_antwort).split('').filter(c => /[A-Z]/.test(c));
  const userArr = [...mcSelected].sort();
  const correctArr = [...correct].sort();
  const isCorrect = userArr.length === correctArr.length && userArr.every((v, i) => v === correctArr[i]);

  const list = $('optionen-list');
  list.querySelectorAll('li').forEach(li => {
    li.classList.add('disabled');
    const k = li.dataset.key;
    if (correctArr.includes(k)) li.classList.add('correct');
    else if (mcSelected.has(k)) li.classList.add('wrong');
  });

  state.answered++;
  if (isCorrect) state.score++;
  recordResult(q, isCorrect ? 'correct' : 'wrong');

  const fb = $('feedback-slot');
  fb.innerHTML = `
    <div class="feedback ${isCorrect ? 'correct' : 'wrong'}">
      <h4>${isCorrect ? 'Richtig' : 'Nicht ganz'}</h4>
      <p><span class="label">Richtige Antwort:</span> ${correctArr.join(', ')}</p>
      <p>${escapeHtml(q.begruendung || '')}</p>
    </div>
  `;
  $('check-btn').textContent = 'Naechste Frage';
  $('check-btn').onclick = nextQuestion;
  scoreText.textContent = `${state.score} / ${state.answered}`;
}

function wireOpen(q) {
  $('check-btn').addEventListener('click', () => showMuster(q));
}

function showMuster(q) {
  let schritteHtml = '';
  if (q.loesung_schritte && q.loesung_schritte.length) {
    schritteHtml = '<p class="label">Loesungsschritte</p><ol>' +
      q.loesung_schritte.map(s => `<li>${escapeHtml(s)}</li>`).join('') + '</ol>';
  }
  let musterHtml = '';
  if (q.musterloesung && q.musterloesung.length) {
    musterHtml = '<p class="label">Musterloesung</p><ul>' +
      q.musterloesung.map(s => `<li>${escapeHtml(s)}</li>`).join('') + '</ul>';
  }

  const fb = $('feedback-slot');
  fb.innerHTML = `
    <div class="feedback">
      <h4>Musterloesung · Selbsteinschaetzung</h4>
      ${schritteHtml}
      ${musterHtml}
      ${q.begruendung ? `<p class="label">Hinweis</p><p>${escapeHtml(q.begruendung)}</p>` : ''}
      <p class="label">Wie war deine Antwort?</p>
      <div class="selfcheck">
        <button class="btn sc-correct" data-sc="correct">Komplett richtig</button>
        <button class="btn sc-partial" data-sc="partial">Teilweise</button>
        <button class="btn sc-wrong" data-sc="wrong">Daneben</button>
      </div>
    </div>
  `;
  if ($('eigenantwort')) $('eigenantwort').disabled = true;
  $('check-btn').style.display = 'none';

  fb.querySelectorAll('.selfcheck button').forEach(btn => {
    btn.addEventListener('click', () => {
      const status = btn.dataset.sc;
      state.answered++;
      if (status === 'correct') state.score++;
      else if (status === 'partial') state.score += 0.5;
      recordResult(q, status);
      scoreText.textContent = `${state.score} / ${state.answered}`;
      nextQuestion();
    });
  });
}

function recordResult(q, status) {
  const entry = {
    id: q.id,
    bereich: q.icb4_bereich,
    element: q.icb4_element,
    typ: q.typ,
    status: status,  // correct | partial | wrong | skipped
  };
  const existingIdx = state.results.findIndex(r => r.id === q.id);
  if (existingIdx >= 0) {
    // Wiederholung: alten Eintrag ersetzen (z. B. skipped -> correct in Review-Runde)
    state.results[existingIdx] = entry;
  } else {
    state.results.push(entry);
  }
}

function nextQuestion() {
  state.index++;
  renderQuestion();
}

// === SKIP-REVIEW (zwischen Hauptlauf und Auswertung) ===
function maybeOfferSkipReview() {
  if (state.reviewRound) { renderEnd(); return; }
  const skippedIds = state.results.filter(r => r.status === 'skipped').map(r => r.id);
  if (skippedIds.length === 0) { renderEnd(); return; }
  renderSkipReview(skippedIds);
}

function renderSkipReview(skippedIds) {
  const n = skippedIds.length;
  const wort = n === 1 ? 'Frage' : 'Fragen';
  questionArea.innerHTML = `
    <div class="card start-card">
      <h2>${n} ${wort} uebersprungen</h2>
      <p>Du hast ${n} ${wort} waehrend des Durchgangs uebersprungen. Magst du sie jetzt nochmal versuchen, bevor du die Auswertung siehst?</p>
      <div class="actions">
        <button class="btn" id="review-btn">Uebersprungene nochmal ansehen</button>
        <button class="btn secondary" id="finish-btn">Direkt zur Auswertung</button>
      </div>
    </div>
  `;
  $('review-btn').addEventListener('click', () => {
    pool = QUESTIONS.filter(q => skippedIds.includes(q.id));
    // In gleicher Reihenfolge wie urspruenglich uebersprungen
    pool.sort((a, b) => skippedIds.indexOf(a.id) - skippedIds.indexOf(b.id));
    state.index = 0;
    state.reviewRound = true;
    renderQuestion();
  });
  $('finish-btn').addEventListener('click', renderEnd);
}

// === END-SCREEN ===
function loadHistory() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch (e) { return []; }
}

function saveHistory(entry) {
  const hist = loadHistory();
  hist.unshift(entry);
  // Maximal 20 Eintraege
  const trimmed = hist.slice(0, 20);
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(trimmed)); }
  catch (e) { /* localStorage voll oder geblockt */ }
  return trimmed;
}

function fmtDate(ts) {
  const d = new Date(ts);
  const opts = { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' };
  return d.toLocaleString('de-DE', opts);
}

function renderEnd() {
  questionArea.innerHTML = '';
  topbar.style.display = 'none';

  // Zusammenzaehlen
  const counts = { correct: 0, partial: 0, wrong: 0, skipped: 0 };
  state.results.forEach(r => counts[r.status]++);

  // Aufschluesselung nach Bereich
  const bereichCounts = {};
  state.results.forEach(r => {
    if (!bereichCounts[r.bereich]) bereichCounts[r.bereich] = { gesamt: 0, score: 0 };
    bereichCounts[r.bereich].gesamt++;
    if (r.status === 'correct') bereichCounts[r.bereich].score++;
    else if (r.status === 'partial') bereichCounts[r.bereich].score += 0.5;
  });

  const total = pool.length;
  const beantwortet = counts.correct + counts.partial + counts.wrong;
  const pct = beantwortet > 0 ? Math.round(state.score / beantwortet * 100) : 0;
  const verdict =
    pct >= 75 ? 'Solide. Pruefungsniveau in Sicht.' :
    pct >= 60 ? 'Auf gutem Weg. Wiederholen schadet nicht.' :
    pct >= 40 ? 'Noch Luft nach oben. Themen gezielt nacharbeiten.' :
                'Grundlage liegt. Stoff strukturiert wiederholen.';

  // Verlauf speichern
  const entry = {
    name: state.name,
    ts: Date.now(),
    score: state.score,
    answered: beantwortet,
    pct: pct,
    counts: counts,
  };
  const history = saveHistory(entry);

  // Bereich-Tabelle
  const bereichOrder = ['Perspective', 'People', 'Practice'];
  const bereichRows = bereichOrder
    .filter(b => bereichCounts[b])
    .map(b => {
      const bc = bereichCounts[b];
      const bPct = Math.round(bc.score / bc.gesamt * 100);
      return `<tr><td class="bereich">${b}</td><td class="num">${bc.score}</td><td class="num">${bc.gesamt}</td><td class="num">${bPct}%</td></tr>`;
    }).join('');

  // Verlauf-Liste (markiere aktuellen Eintrag)
  const verlaufItems = history.map((h, i) => {
    const isSelf = (i === 0);
    return `<li class="${isSelf ? 'self' : ''}">
      <span><span class="name-col">${escapeHtml(h.name)}</span><span class="meta-info">${fmtDate(h.ts)} · ${h.counts.correct} r / ${h.counts.wrong} f / ${h.counts.partial} t / ${h.counts.skipped} ü</span></span>
      <span class="score-col">${h.pct}%</span>
    </li>`;
  }).join('');

  endArea.style.display = 'block';
  endArea.innerHTML = `
    <div class="card end-screen">
      <h2>Auswertung</h2>
      <p class="name-out">fuer <strong>${escapeHtml(state.name)}</strong></p>
      <div class="score-big">${pct}%</div>
      <p class="verdict">${verdict}</p>

      <div class="result-grid">
        <div class="box correct"><div class="n">${counts.correct}</div><div class="l">Richtig</div></div>
        <div class="box partial"><div class="n">${counts.partial}</div><div class="l">Teilweise</div></div>
        <div class="box wrong"><div class="n">${counts.wrong}</div><div class="l">Falsch</div></div>
        <div class="box skip"><div class="n">${counts.skipped}</div><div class="l">Uebersprungen</div></div>
      </div>

      <div class="breakdown">
        <h3>Nach ICB4-Bereich</h3>
        <table>
          <thead><tr><th>Bereich</th><th class="num">Punkte</th><th class="num">Fragen</th><th class="num">%</th></tr></thead>
          <tbody>${bereichRows}</tbody>
        </table>
      </div>

      <div class="verlauf">
        <h3>Letzte Durchgaenge auf diesem Geraet <button class="clear-link" id="clear-history">Verlauf loeschen</button></h3>
        <ul class="verlauf-liste">${verlaufItems}</ul>
      </div>

      <div class="end-actions">
        <button class="btn" onclick="location.reload()">Naechster Teilnehmer</button>
      </div>
    </div>
  `;

  const clearBtn = $('clear-history');
  if (clearBtn) clearBtn.addEventListener('click', () => {
    if (confirm('Wirklich alle gespeicherten Durchgaenge auf diesem Geraet loeschen?')) {
      try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
      location.reload();
    }
  });
}

// Init
renderStart();
</script>
</body>
</html>
