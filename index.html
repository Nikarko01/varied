<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tools Hub</title>
<style>
  :root {
    --bg: #0a1628;
    --bg-elev: #111d33;
    --card: #152238;
    --card-hover: #1a2a45;
    --border: #24344f;
    --text: #e6edf5;
    --text-dim: #8a99b3;
    --text-mute: #5c6b85;
    --accent: #4cc9f0;
    --mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
    background-image:
      radial-gradient(circle at 15% 10%, rgba(76, 201, 240, 0.06) 0%, transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(167, 139, 250, 0.05) 0%, transparent 40%);
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 3rem 1.5rem 4rem;
  }

  /* Header */
  header {
    margin-bottom: 3rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 2rem;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }

  .brand-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
  }

  .brand-label {
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  h1 {
    font-size: clamp(1.8rem, 4vw, 2.5rem);
    font-weight: 700;
    margin-bottom: 0.75rem;
    letter-spacing: -0.02em;
  }

  .subtitle {
    color: var(--text-dim);
    max-width: 640px;
    font-size: 1.05rem;
  }

  .stats {
    display: flex;
    gap: 2rem;
    margin-top: 1.5rem;
    font-family: var(--mono);
    font-size: 0.85rem;
  }

  .stat-value { color: var(--accent); font-weight: 600; }
  .stat-label { color: var(--text-mute); margin-left: 0.4rem; }

  /* Filters */
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 2rem;
  }

  .filter-btn {
    font-family: var(--mono);
    font-size: 0.78rem;
    padding: 0.45rem 0.9rem;
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.02em;
  }

  .filter-btn:hover {
    color: var(--text);
    border-color: var(--text-dim);
  }

  .filter-btn.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 600;
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.25rem;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem;
    transition: all 0.25s ease;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--tag-color, var(--accent));
    opacity: 0.6;
    transition: opacity 0.25s ease;
  }

  .card:hover {
    background: var(--card-hover);
    border-color: var(--tag-color, var(--accent));
    transform: translateY(-2px);
  }

  .card:hover::before { opacity: 1; }

  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
    margin-bottom: 0.9rem;
  }

  .card-title {
    font-size: 1.15rem;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .tag {
    font-family: var(--mono);
    font-size: 0.7rem;
    padding: 0.25rem 0.6rem;
    border-radius: 4px;
    background: color-mix(in srgb, var(--tag-color) 18%, transparent);
    color: var(--tag-color);
    border: 1px solid color-mix(in srgb, var(--tag-color) 35%, transparent);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .card-desc {
    color: var(--text-dim);
    font-size: 0.92rem;
    margin-bottom: 1.25rem;
    flex-grow: 1;
  }

  .card-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--text-mute);
    padding-top: 1rem;
    border-top: 1px dashed var(--border);
  }

  .card-link {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
    font-size: 0.85rem;
    font-family: var(--mono);
    transition: gap 0.2s ease;
  }

  .card-link:hover { gap: 0.7rem; }

  .card-link .arrow { transition: transform 0.2s ease; }
  .card-link:hover .arrow { transform: translateX(2px); }

  /* Empty state */
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-mute);
    font-family: var(--mono);
    font-size: 0.9rem;
  }

  /* Footer */
  footer {
    margin-top: 4rem;
    padding-top: 2rem;
    border-top: 1px solid var(--border);
    text-align: center;
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--text-mute);
  }

  @media (max-width: 480px) {
    .container { padding: 2rem 1rem; }
    .stats { gap: 1rem; flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div class="container">

  <header>
    <div class="brand">
      <span class="brand-dot"></span>
      <span class="brand-label">Tools Hub</span>
    </div>
    <h1>Calculators &amp; Interactive Tools</h1>
    <p class="subtitle">
      A collection of lightweight HTML tools for project management, finance, and productivity.
      All client-side, no installs, no tracking.
    </p>
    <div class="stats">
      <div><span class="stat-value" id="toolCount">0</span><span class="stat-label">tools</span></div>
      <div><span class="stat-value" id="catCount">0</span><span class="stat-label">categories</span></div>
    </div>
  </header>

  <div class="filters" id="filters"></div>

  <div class="grid" id="grid"></div>

  <footer>
    hosted on github pages · updated <span id="updated"></span>
  </footer>

</div>

<script>
  /* ============================================================
     TOOLS REGISTRY
     ------------------------------------------------------------
     To add a new tool, just append an object to this array.
     Required: title, file, category, description
     Optional: type, updated
     ============================================================ */
  const TOOLS = [
    {
      title: "IPMA YouTube Playlist Tracker",
      file: "IPMA-youtube_playlist_tracker.html",
      category: "IPMA",
      description: "Track your progress through the IPMA ICB4 YouTube playlist. Mark videos as watched and see remaining time at a glance.",
      type: "tracker",
      updated: "2026-06"

    },
    {
  title: "Der Die Das",
  file: "derdiedas/index.html", // Points to the folder
  category: "Learning",
  description: "German article trainer.",
  type: "directory",
  updated: "2026-06"
}
  ];

  /* Tag color palette by category */
  const TAG_COLORS = {
    "IPMA":         "#4cc9f0",
    "Finance":      "#10b981",
    "Planning":     "#f59e0b",
    "Productivity": "#a78bfa",
    "Learning":     "#f472b6",
    "General":      "#8a99b3"
  };

  const getColor = (cat) => TAG_COLORS[cat] || TAG_COLORS["General"];

  /* Render filters */
  const filtersEl = document.getElementById("filters");
  const gridEl = document.getElementById("grid");
  const categories = ["All", ...new Set(TOOLS.map(t => t.category))];

  categories.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "filter-btn" + (cat === "All" ? " active" : "");
    btn.textContent = cat;
    btn.dataset.cat = cat;
    btn.onclick = () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      renderGrid(cat);
    };
    filtersEl.appendChild(btn);
  });

  /* Render cards */
  function renderGrid(filter = "All") {
    const list = filter === "All" ? TOOLS : TOOLS.filter(t => t.category === filter);
    gridEl.innerHTML = "";

    if (list.length === 0) {
      gridEl.innerHTML = '<div class="empty">No tools in this category yet.</div>';
      return;
    }

    list.forEach(tool => {
      const color = getColor(tool.category);
      const card = document.createElement("article");
      card.className = "card";
      card.style.setProperty("--tag-color", color);

      card.innerHTML = `
        <div class="card-head">
          <h2 class="card-title">${tool.title}</h2>
          <span class="tag">${tool.category}</span>
        </div>
        <p class="card-desc">${tool.description}</p>
        <div class="card-meta">
          <span>${tool.type || "tool"} · ${tool.updated || ""}</span>
          <a class="card-link" href="${tool.file}">
            open <span class="arrow">→</span>
          </a>
        </div>
      `;
      gridEl.appendChild(card);
    });
  }

  /* Stats */
  document.getElementById("toolCount").textContent = TOOLS.length;
  document.getElementById("catCount").textContent = new Set(TOOLS.map(t => t.category)).size;
  document.getElementById("updated").textContent = new Date().toLocaleDateString("en-US", { month: "short", year: "numeric" });

  renderGrid();
</script>

</body>
</html>
