<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tools Hub</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

  <header>
    <div class="brand">
      <span class="brand-dot"></span>
      <span class="brand-label">Tools Hub</span>
    </div>
    <h1>Calculators &amp; Interactive Tools</h1>
    <p class="subtitle">
      A collection of lightweight HTML tools for project management, finance, and productivity.
      All client-side, no installs, no tracking.
    </p>
    <div class="stats">
      <div><span class="stat-value" id="toolCount">0</span><span class="stat-label">tools</span></div>
      <div><span class="stat-value" id="catCount">0</span><span class="stat-label">categories</span></div>
    </div>
  </header>

  <div class="filters" id="filters"></div>

  <div class="grid" id="grid"></div>

  <footer>
    hosted on github pages · updated <span id="updated"></span>
  </footer>

</div>

<script>
  /* ============================================================
     TOOLS REGISTRY
     ------------------------------------------------------------
     To add a new tool, just append an object to this array.
     Required: title, file, category, description
     Optional: type, updated
     ============================================================ */
  const TOOLS = [
    {
      title: "IPMA YouTube Playlist Tracker",
      file: "ipma-video-playlist-tracker/index.html",
      category: "IPMA",
      description: "Track your progress through the IPMA ICB4 YouTube playlist. Mark videos as watched and see remaining time at a glance.",
      type: "tracker",
      updated: "2026-06"

    },
    {
  title: "Der Die Das",
  file: "derdiedas/index.html", // Points to the folder
  category: "Learning",
  description: "German article trainer.",
  type: "directory",
  updated: "2026-06"
}
  ];

  /* Tag color palette by category */
  const TAG_COLORS = {
    "IPMA":         "#4cc9f0",
    "Finance":      "#10b981",
    "Planning":     "#f59e0b",
    "Productivity": "#a78bfa",
    "Learning":     "#f472b6",
    "General":      "#8a99b3"
  };

  const getColor = (cat) => TAG_COLORS[cat] || TAG_COLORS["General"];

  /* Render filters */
  const filtersEl = document.getElementById("filters");
  const gridEl = document.getElementById("grid");
  const categories = ["All", ...new Set(TOOLS.map(t => t.category))];

  categories.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "filter-btn" + (cat === "All" ? " active" : "");
    btn.textContent = cat;
    btn.dataset.cat = cat;
    btn.onclick = () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      renderGrid(cat);
    };
    filtersEl.appendChild(btn);
  });

  /* Render cards */
  function renderGrid(filter = "All") {
    const list = filter === "All" ? TOOLS : TOOLS.filter(t => t.category === filter);
    gridEl.innerHTML = "";

    if (list.length === 0) {
      gridEl.innerHTML = '<div class="empty">No tools in this category yet.</div>';
      return;
    }

    list.forEach(tool => {
      const color = getColor(tool.category);
      const card = document.createElement("article");
      card.className = "card";
      card.style.setProperty("--tag-color", color);

      card.innerHTML = `
        <div class="card-head">
          <h2 class="card-title">${tool.title}</h2>
          <span class="tag">${tool.category}</span>
        </div>
        <p class="card-desc">${tool.description}</p>
        <div class="card-meta">
          <span>${tool.type || "tool"} · ${tool.updated || ""}</span>
          <a class="card-link" href="${tool.file}">
            open <span class="arrow">→</span>
          </a>
        </div>
      `;
      gridEl.appendChild(card);
    });
  }

  /* Stats */
  document.getElementById("toolCount").textContent = TOOLS.length;
  document.getElementById("catCount").textContent = new Set(TOOLS.map(t => t.category)).size;
  document.getElementById("updated").textContent = new Date().toLocaleDateString("en-US", { month: "short", year: "numeric" });

  renderGrid();
</script>

</body>
</html>
