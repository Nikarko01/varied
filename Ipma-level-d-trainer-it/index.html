<html lang="de">
<head>

<title>IPMA Level D · Pruefungssimulation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #2B7A78;
    --secondary: #3AAFA9;
    --light: #DEF2F1;
    --dark: #17252A;
    --white: #FEFFFF;
    --muted: #5a6f74;
    --green: #2e8a5e;
    --red: #c0392b;
    --yellow: #c98a16;
    --border: #cfe4e2;
    --shadow: 0 1px 3px rgba(23,37,42,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--light); color: var(--dark); font-family: "Source Sans 3", "Source Sans Pro", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; line-height: 1.55; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 820px; margin: 0 auto; padding: 28px 20px 80px; }

  header { background: var(--primary); color: var(--white); padding: 22px 24px; border-radius: 10px; margin-bottom: 20px; box-shadow: var(--shadow); }
  h1 { font-family: "Poppins", sans-serif; font-size: 22px; font-weight: 600; letter-spacing: -0.2px; }
  .sub { font-size: 13px; opacity: 0.9; margin-top: 4px; font-weight: 400; }

  .topbar { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; margin-bottom: 18px; display: flex; align-items: center; gap: 16px; box-shadow: var(--shadow); flex-wrap: wrap; }
  .topbar .name-chip { font-family: "Poppins", sans-serif; font-weight: 600; font-size: 13px; color: var(--white); background: var(--secondary); padding: 4px 10px; border-radius: 12px; white-space: nowrap; }
  .topbar .progress-text { font-family: "Poppins", sans-serif; font-weight: 600; font-size: 14px; color: var(--dark); white-space: nowrap; }
  .topbar .bar { flex: 1; min-width: 120px; height: 6px; background: var(--light); border-radius: 3px; overflow: hidden; }
  .topbar .fill { height: 100%; background: var(--secondary); transition: width 0.3s ease; }
  .topbar .score { font-family: "Poppins", sans-serif; font-weight: 600; font-size: 14px; color: var(--primary); white-space: nowrap; }

  .card { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 26px; margin-bottom: 16px; box-shadow: var(--shadow); }

  /* Startkarte */
  .start-card h2 { font-family: "Poppins", sans-serif; font-size: 22px; color: var(--primary); margin-bottom: 10px; font-weight: 600; }
  .start-card p { color: var(--muted); margin-bottom: 18px; font-size: 15px; }
  .start-card ul { color: var(--dark); font-size: 14.5px; margin: 0 0 22px 20px; }
  .start-card ul li { margin-bottom: 6px; }
  .start-card label { display: block; font-family: "Poppins", sans-serif; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 6px; }
  .start-card input[type=text] { width: 100%; background: var(--white); border: 1.5px solid var(--border); border-radius: 8px; padding: 12px 14px; font-family: inherit; font-size: 16px; color: var(--dark); }
  .start-card input[type=text]:focus { outline: none; border-color: var(--secondary); box-shadow: 0 0 0 3px rgba(58,175,169,0.15); }
  .start-card .actions { margin-top: 18px; }

  .meta { display: flex; gap: 8px; flex-wrap: wrap; font-size: 11px; margin-bottom: 16px; }
  .tag { background: var(--light); color: var(--primary); padding: 4px 10px; border-radius: 12px; text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; }
  .tag.element { background: var(--primary); color: var(--white); }
  .tag.type { background: var(--secondary); color: var(--white); }
  .tag.bloom { background: transparent; border: 1px solid var(--border); color: var(--muted); }

  .frage { font-family: "Poppins", sans-serif; font-size: 17px; font-weight: 500; color: var(--dark); margin-bottom: 18px; line-height: 1.45; white-space: pre-wrap; }

  .optionen { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .optionen li { background: var(--white); border: 1.5px solid var(--border); border-radius: 8px; padding: 13px 15px; cursor: pointer; transition: all 0.15s; font-size: 15px; display: flex; gap: 12px; line-height: 1.4; }
  .optionen li:hover:not(.disabled) { border-color: var(--secondary); background: var(--light); }
  .optionen li.selected { border-color: var(--secondary); background: var(--light); }
  .optionen li.correct { border-color: var(--green); background: rgba(46,138,94,0.08); }
  .optionen li.wrong { border-color: var(--red); background: rgba(192,57,43,0.06); }
  .optionen li.disabled { cursor: default; }
  .optionen .letter { font-family: "Poppins", sans-serif; font-weight: 700; color: var(--secondary); min-width: 22px; }
  .optionen li.correct .letter { color: var(--green); }
  .optionen li.wrong .letter { color: var(--red); }

  textarea.eigenantwort { width: 100%; min-height: 110px; background: var(--white); color: var(--dark); border: 1.5px solid var(--border); border-radius: 8px; padding: 12px 14px; font-family: inherit; font-size: 15px; resize: vertical; line-height: 1.5; }
  textarea.eigenantwort:focus { outline: none; border-color: var(--secondary); box-shadow: 0 0 0 3px rgba(58,175,169,0.15); }

  .gegeben { background: var(--light); border-left: 3px solid var(--primary); padding: 12px 16px; margin: 14px 0; font-size: 14.5px; color: var(--dark); border-radius: 0 6px 6px 0; }
  .gegeben .titel { font-family: "Poppins", sans-serif; font-weight: 600; color: var(--primary); font-size: 12px; text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 6px; }
  .gegeben .zeile { display: flex; justify-content: space-between; gap: 12px; padding: 3px 0; border-bottom: 1px dashed rgba(43,122,120,0.18); }
  .gegeben .zeile:last-child { border-bottom: none; }
  .gegeben .key { color: var(--muted); }
  .gegeben .val { font-family: "Poppins", sans-serif; font-weight: 600; color: var(--dark); }

  .feedback { margin-top: 20px; padding: 16px 18px; background: var(--light); border-radius: 8px; border-left: 4px solid var(--primary); }
  .feedback.correct { border-left-color: var(--green); background: rgba(46,138,94,0.06); }
  .feedback.wrong { border-left-color: var(--red); background: rgba(192,57,43,0.05); }
  .feedback h4 { font-family: "Poppins", sans-serif; font-size: 13px; color: var(--primary); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; font-weight: 600; }
  .feedback.correct h4 { color: var(--green); }
  .feedback.wrong h4 { color: var(--red); }
  .feedback p, .feedback li { font-size: 14.5px; color: var(--dark); margin-bottom: 6px; white-space: pre-wrap; line-height: 1.5; }
  .feedback ul, .feedback ol { padding-left: 20px; }
  .feedback ul li, .feedback ol li { margin-bottom: 4px; }
  .feedback .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.7px; margin: 14px 0 6px; font-family: "Poppins", sans-serif; font-weight: 600; }

  .actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
  .btn { background: var(--primary); color: var(--white); border: none; padding: 11px 22px; border-radius: 6px; font-size: 14.5px; font-weight: 600; cursor: pointer; font-family: "Poppins", sans-serif; transition: background 0.15s; }
  .btn:hover { background: var(--secondary); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.secondary { background: transparent; color: var(--primary); border: 1.5px solid var(--border); }
  .btn.secondary:hover { background: var(--light); border-color: var(--secondary); }

  .selfcheck { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .selfcheck .btn { flex: 1; min-width: 110px; padding: 10px 14px; font-size: 14px; }
  .sc-correct { background: var(--green); }
  .sc-correct:hover { background: #246e4b; }
  .sc-partial { background: var(--yellow); }
  .sc-partial:hover { background: #a87011; }
  .sc-wrong { background: var(--red); }
  .sc-wrong:hover { background: #99311f; }

  /* End-Screen */
  .end-screen h2 { font-family: "Poppins", sans-serif; font-size: 24px; color: var(--primary); margin-bottom: 4px; font-weight: 600; text-align: center; }
  .end-screen .name-out { text-align: center; color: var(--muted); margin-bottom: 18px; font-size: 15px; }
  .end-screen .name-out strong { color: var(--dark); font-family: "Poppins", sans-serif; }
  .end-screen .score-big { font-family: "Poppins", sans-serif; font-size: 60px; font-weight: 700; color: var(--primary); margin: 18px 0 4px; line-height: 1; text-align: center; }
  .end-screen .verdict { color: var(--muted); margin-bottom: 24px; font-size: 15.5px; text-align: center; }

  .result-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 24px 0 12px; }
  .result-grid .box { background: var(--light); border-radius: 8px; padding: 14px 8px; text-align: center; }
  .result-grid .box.correct { background: rgba(46,138,94,0.10); }
  .result-grid .box.partial { background: rgba(201,138,22,0.10); }
  .result-grid .box.wrong { background: rgba(192,57,43,0.08); }
  .result-grid .box.skip { background: rgba(90,111,116,0.08); }
  .result-grid .n { font-family: "Poppins", sans-serif; font-size: 26px; font-weight: 700; line-height: 1.2; }
  .result-grid .box.correct .n { color: var(--green); }
  .result-grid .box.partial .n { color: var(--yellow); }
  .result-grid .box.wrong .n { color: var(--red); }
  .result-grid .box.skip .n { color: var(--muted); }
  .result-grid .box .n { color: var(--primary); }
  .result-grid .l { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-top: 4px; font-weight: 600; font-family: "Poppins", sans-serif; }

  .breakdown { margin-top: 24px; }
  .breakdown h3 { font-family: "Poppins", sans-serif; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 10px; font-weight: 600; }
  .breakdown table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .breakdown th, .breakdown td { padding: 8px 10px; border-bottom: 1px solid var(--border); text-align: left; }
  .breakdown th { font-family: "Poppins", sans-serif; font-weight: 600; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.6px; }
  .breakdown td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .breakdown td.bereich { font-family: "Poppins", sans-serif; font-weight: 600; color: var(--primary); }

  .verlauf { margin-top: 28px; }
  .verlauf h3 { font-family: "Poppins", sans-serif; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 10px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
  .verlauf .clear-link { font-size: 11px; text-transform: none; letter-spacing: 0; color: var(--muted); cursor: pointer; background: none; border: none; font-family: inherit; }
  .verlauf .clear-link:hover { color: var(--red); text-decoration: underline; }
  .verlauf-liste { list-style: none; }
  .verlauf-liste li { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: var(--light); border-radius: 6px; margin-bottom: 6px; font-size: 14px; }
  .verlauf-liste li.self { background: var(--secondary); color: var(--white); }
  .verlauf-liste li.self .meta-info { color: rgba(255,255,255,0.85); }
  .verlauf-liste .name-col { font-family: "Poppins", sans-serif; font-weight: 600; }
  .verlauf-liste .meta-info { font-size: 12px; color: var(--muted); margin-left: 8px; }
  .verlauf-liste .score-col { font-family: "Poppins", sans-serif; font-weight: 700; }

  .end-actions { display: flex; gap: 10px; margin-top: 26px; justify-content: center; flex-wrap: wrap; }

  footer { margin-top: 60px; padding-top: 24px; border-top: 1px solid var(--border); color: var(--muted); font-size: 12.5px; text-align: center; line-height: 1.6; }
  footer a { color: var(--primary); text-decoration: none; font-weight: 600; }
  footer a:hover { text-decoration: underline; }
  footer .epa-mark { font-family: "Poppins", sans-serif; font-weight: 600; color: var(--primary); letter-spacing: 0.3px; }

  @media (max-width: 600px) {
    .topbar { flex-wrap: wrap; gap: 10px; }
    .topbar .bar { order: 4; flex-basis: 100%; }
    .result-grid { grid-template-columns: repeat(2, 1fr); }
    h1 { font-size: 19px; }
    .frage { font-size: 16px; }
    .card { padding: 20px; }
    .wrap { padding: 18px 14px 60px; }
    .end-screen .score-big { font-size: 50px; }
  }
</style>
</head>

const GIVEN_MAP = {
  a_optimistisch: { label: 'a (optimistisch)', unit: 'Tage' },
  m_wahrscheinlichst: { label: 'm (wahrscheinlich)', unit: 'Tage' },
  b_pessimistisch: { label: 'b (pessimistisch)', unit: 'Tage' },
  BAC: { label: 'BAC (Budget at Completion)', unit: 'EUR' },
  BCWS_PV: { label: 'BCWS / PV (Planned Value)', unit: 'EUR' },
  BCWP_EV: { label: 'BCWP / EV (Earned Value)', unit: 'EUR' },
  ACWP_AC: { label: 'ACWP / AC (Actual Cost)', unit: 'EUR' },
  EAC: { label: 'EAC', unit: 'EUR' },
  ETC: { label: 'ETC', unit: 'EUR' },
};

function fmtNumber(val) {
  if (typeof val !== 'number') return String(val);
  return val.toLocaleString('de-DE');
}

function fmtGiven(key, val) {
  const meta = GIVEN_MAP[key];
  const label = meta ? meta.label : key.replaceAll('_', ' / ');
  let unit = meta ? meta.unit : '';
  // Heuristik: keine Einheit aber Geldbetrag-typischer Key
  if (!meta && /^(BAC|BCWS|BCWP|ACWP|PV|EV|AC|EAC|ETC|CV|SV)$/.test(key)) unit = 'EUR';
  let valStr;
  if (typeof val === 'number') {
    valStr = fmtNumber(val);
    if (unit === 'EUR') valStr += ' €';      // 500.000 €
    else if (unit === 'Tage') valStr += ' Tage';
    else if (unit) valStr += ' ' + unit;
  } else {
    valStr = String(val);
  }
  return { label, valStr };
}

// Pool mischen
let pool = QUESTIONS.slice();
for (let i = pool.length - 1; i > 0; i--) {
  const j = Math.floor(Math.random() * (i + 1));
  [pool[i], pool[j]] = [pool[j], pool[i]];
}
const ORIGINAL_POOL_SIZE = pool.length;

const state = {
  name: '',
  index: 0,
  score: 0,
  answered: 0,
  results: [],  // pro Frage: {id, bereich, element, typ, status}
  reviewRound: false,
};

const $ = (id) => document.getElementById(id);
const startArea = $('start-area');
const topbar = $('topbar');
const nameChip = $('name-chip');
const progressText = $('progress-text');
const progressFill = $('progress-fill');
const scoreText = $('score-text');
const questionArea = $('question-area');
const endArea = $('end-area');

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function typLabel(typ) {
  if (typ === 'single_choice') return 'Single Choice';
  if (typ === 'multiple_choice') return 'Multiple Choice';
  if (typ === 'open') return 'Offen';
  if (typ === 'open_rechnung') return 'Rechnung';
  return typ;
}

// === START-SCREEN ===
function renderStart() {
  startArea.innerHTML = `
    <div class="card start-card">
      <h2>Pronto per la simulazione d'esame?</h2>
      <p>56 domande da tutti i 28 elementi di competenza ICB4. Un mix di domande a scelta singola, domande aperte e due esercizi di calcolo (PERT ed Earned Value Analysis).</p>
      <ul>
        <li>Per le domande a scelta singola: scegli una risposta, verifica.</li>
        <li>Per le domande aperte: digita la tua risposta, confrontala con la soluzione modello, valutati onestamente.</li>
        <li>Non sai andare avanti? Salta semplicemente la domanda.</li>
        <li>Alla fine riceverai la tua valutazione personale.</li>
      </ul>
      <label for="name-input">Il tuo nome (o sigla)</label>
      <input type="text" id="name-input" placeholder="es. Tim, Andi M., Tester 3 ..." maxlength="40" autocomplete="off" />
      <div class="actions">
        <button class="btn" id="start-btn">Avvia simulazione</button>
      </div>
    </div>
  `;
  const input = $('name-input');
  const btn = $('start-btn');
  input.focus();
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') btn.click(); });
  btn.addEventListener('click', () => {
    const val = input.value.trim() || 'Teilnehmer';
    state.name = val;
    nameChip.textContent = val;
    startArea.innerHTML = '';
    topbar.style.display = 'flex';
    renderQuestion();
  });
}

// === FRAGEN-RENDERING ===
function updateProgress() {
  const total = pool.length;
  const prefix = state.reviewRound ? 'Wiederholung' : 'Frage';
  progressText.textContent = `${prefix} ${Math.min(state.index + 1, total)} / ${total}`;
  progressFill.style.width = (state.index / total * 100) + '%';
  scoreText.textContent = `${state.score} / ${state.answered}`;
}

function renderQuestion() {
  if (state.index >= pool.length) { maybeOfferSkipReview(); return; }
  updateProgress();
  const q = pool[state.index];
  const isMC = q.typ === 'single_choice' || q.typ === 'multiple_choice';

  let optionenHtml = '';
  if (isMC && q.optionen) {
    optionenHtml = '<ul class="optionen" id="optionen-list">' +
      Object.entries(q.optionen).map(([k, v]) =>
        `<li data-key="${k}"><span class="letter">${k}</span><span>${escapeHtml(v)}</span></li>`
      ).join('') + '</ul>';
  } else {
    optionenHtml = '<textarea class="eigenantwort" id="eigenantwort" placeholder="Deine Antwort (zum Selbstvergleich) ..."></textarea>';
  }

  let gegebenHtml = '';
  if (q.gegeben) {
    const zeilen = Object.entries(q.gegeben).map(([k, v]) => {
      const { label, valStr } = fmtGiven(k, v);
      return `<div class="zeile"><span class="key">${escapeHtml(label)}</span><span class="val">${escapeHtml(valStr)}</span></div>`;
    }).join('');
    gegebenHtml = `<div class="gegeben"><div class="titel">Gegeben</div>${zeilen}</div>`;
  }

  questionArea.innerHTML = `
    <div class="card">
      <div class="meta">
        <span class="tag element">${q.icb4_element} ${escapeHtml(q.icb4_bezeichnung)}</span>
        <span class="tag type">${typLabel(q.typ)}</span>
        <span class="tag bloom">Bloom ${q.bloom_niveau}</span>
      </div>
      <p class="frage">${escapeHtml(q.frage)}</p>
      ${gegebenHtml}
      ${optionenHtml}
      <div class="actions">
        <button class="btn" id="check-btn">${isMC ? 'Antwort pruefen' : 'Musterloesung zeigen'}</button>
        <button class="btn secondary" id="skip-btn">Ueberspringen</button>
      </div>
      <div id="feedback-slot"></div>
    </div>
  `;

  if (isMC) wireMC(q); else wireOpen(q);
  $('skip-btn').addEventListener('click', () => {
    recordResult(q, 'skipped');
    nextQuestion();
  });
}

let mcSelected = new Set();
function wireMC(q) {
  mcSelected = new Set();
  const list = $('optionen-list');
  const isMulti = q.typ === 'multiple_choice';
  list.querySelectorAll('li').forEach(li => {
    li.addEventListener('click', () => {
      if (li.classList.contains('disabled')) return;
      const k = li.dataset.key;
      if (isMulti) {
        if (mcSelected.has(k)) { mcSelected.delete(k); li.classList.remove('selected'); }
        else { mcSelected.add(k); li.classList.add('selected'); }
      } else {
        list.querySelectorAll('li').forEach(x => x.classList.remove('selected'));
        mcSelected = new Set([k]);
        li.classList.add('selected');
      }
    });
  });
  $('check-btn').addEventListener('click', () => checkMC(q));
}

function checkMC(q) {
  if (mcSelected.size === 0) { alert('Bitte erst eine Antwort waehlen.'); return; }
  const correct = String(q.richtige_antwort).split('').filter(c => /[A-Z]/.test(c));
  const userArr = [...mcSelected].sort();
  const correctArr = [...correct].sort();
  const isCorrect = userArr.length === correctArr.length && userArr.every((v, i) => v === correctArr[i]);

  const list = $('optionen-list');
  list.querySelectorAll('li').forEach(li => {
    li.classList.add('disabled');
    const k = li.dataset.key;
    if (correctArr.includes(k)) li.classList.add('correct');
    else if (mcSelected.has(k)) li.classList.add('wrong');
  });

  state.answered++;
  if (isCorrect) state.score++;
  recordResult(q, isCorrect ? 'correct' : 'wrong');

  const fb = $('feedback-slot');
  fb.innerHTML = `
    <div class="feedback ${isCorrect ? 'correct' : 'wrong'}">
      <h4>${isCorrect ? 'Richtig' : 'Nicht ganz'}</h4>
      <p><span class="label">Richtige Antwort:</span> ${correctArr.join(', ')}</p>
      <p>${escapeHtml(q.begruendung || '')}</p>
    </div>
  `;
  $('check-btn').textContent = 'Naechste Frage';
  $('check-btn').onclick = nextQuestion;
  scoreText.textContent = `${state.score} / ${state.answered}`;
}

function wireOpen(q) {
  $('check-btn').addEventListener('click', () => showMuster(q));
}

function showMuster(q) {
  let schritteHtml = '';
  if (q.loesung_schritte && q.loesung_schritte.length) {
    schritteHtml = '<p class="label">Loesungsschritte</p><ol>' +
      q.loesung_schritte.map(s => `<li>${escapeHtml(s)}</li>`).join('') + '</ol>';
  }
  let musterHtml = '';
  if (q.musterloesung && q.musterloesung.length) {
    musterHtml = '<p class="label">Musterloesung</p><ul>' +
      q.musterloesung.map(s => `<li>${escapeHtml(s)}</li>`).join('') + '</ul>';
  }

  const fb = $('feedback-slot');
  fb.innerHTML = `
    <div class="feedback">
      <h4>Musterloesung · Selbsteinschaetzung</h4>
      ${schritteHtml}
      ${musterHtml}
      ${q.begruendung ? `<p class="label">Hinweis</p><p>${escapeHtml(q.begruendung)}</p>` : ''}
      <p class="label">Wie war deine Antwort?</p>
      <div class="selfcheck">
        <button class="btn sc-correct" data-sc="correct">Komplett richtig</button>
        <button class="btn sc-partial" data-sc="partial">Teilweise</button>
        <button class="btn sc-wrong" data-sc="wrong">Daneben</button>
      </div>
    </div>
  `;
  if ($('eigenantwort')) $('eigenantwort').disabled = true;
  $('check-btn').style.display = 'none';

  fb.querySelectorAll('.selfcheck button').forEach(btn => {
    btn.addEventListener('click', () => {
      const status = btn.dataset.sc;
      state.answered++;
      if (status === 'correct') state.score++;
      else if (status === 'partial') state.score += 0.5;
      recordResult(q, status);
      scoreText.textContent = `${state.score} / ${state.answered}`;
      nextQuestion();
    });
  });
}

function recordResult(q, status) {
  const entry = {
    id: q.id,
    bereich: q.icb4_bereich,
    element: q.icb4_element,
    typ: q.typ,
    status: status,  // correct | partial | wrong | skipped
  };
  const existingIdx = state.results.findIndex(r => r.id === q.id);
  if (existingIdx >= 0) {
    // Wiederholung: alten Eintrag ersetzen (z. B. skipped -> correct in Review-Runde)
    state.results[existingIdx] = entry;
  } else {
    state.results.push(entry);
  }
}

function nextQuestion() {
  state.index++;
  renderQuestion();
}

// === SKIP-REVIEW (zwischen Hauptlauf und Auswertung) ===
function maybeOfferSkipReview() {
  if (state.reviewRound) { renderEnd(); return; }
  const skippedIds = state.results.filter(r => r.status === 'skipped').map(r => r.id);
  if (skippedIds.length === 0) { renderEnd(); return; }
  renderSkipReview(skippedIds);
}

function renderSkipReview(skippedIds) {
  const n = skippedIds.length;
  const wort = n === 1 ? 'Frage' : 'Fragen';
  questionArea.innerHTML = `
    <div class="card start-card">
      <h2>${n} ${wort} uebersprungen</h2>
      <p>Du hast ${n} ${wort} waehrend des Durchgangs uebersprungen. Magst du sie jetzt nochmal versuchen, bevor du die Auswertung siehst?</p>
      <div class="actions">
        <button class="btn" id="review-btn">Uebersprungene nochmal ansehen</button>
        <button class="btn secondary" id="finish-btn">Direkt zur Auswertung</button>
      </div>
    </div>
  `;
  $('review-btn').addEventListener('click', () => {
    pool = QUESTIONS.filter(q => skippedIds.includes(q.id));
    // In gleicher Reihenfolge wie urspruenglich uebersprungen
    pool.sort((a, b) => skippedIds.indexOf(a.id) - skippedIds.indexOf(b.id));
    state.index = 0;
    state.reviewRound = true;
    renderQuestion();
  });
  $('finish-btn').addEventListener('click', renderEnd);
}

// === END-SCREEN ===
function loadHistory() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch (e) { return []; }
}

function saveHistory(entry) {
  const hist = loadHistory();
  hist.unshift(entry);
  // Maximal 20 Eintraege
  const trimmed = hist.slice(0, 20);
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(trimmed)); }
  catch (e) { /* localStorage voll oder geblockt */ }
  return trimmed;
}

function fmtDate(ts) {
  const d = new Date(ts);
  const opts = { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' };
  return d.toLocaleString('de-DE', opts);
}

function renderEnd() {
  questionArea.innerHTML = '';
  topbar.style.display = 'none';

  // Zusammenzaehlen
  const counts = { correct: 0, partial: 0, wrong: 0, skipped: 0 };
  state.results.forEach(r => counts[r.status]++);

  // Aufschluesselung nach Bereich
  const bereichCounts = {};
  state.results.forEach(r => {
    if (!bereichCounts[r.bereich]) bereichCounts[r.bereich] = { gesamt: 0, score: 0 };
    bereichCounts[r.bereich].gesamt++;
    if (r.status === 'correct') bereichCounts[r.bereich].score++;
    else if (r.status === 'partial') bereichCounts[r.bereich].score += 0.5;
  });

  const total = pool.length;
  const beantwortet = counts.correct + counts.partial + counts.wrong;
  const pct = beantwortet > 0 ? Math.round(state.score / beantwortet * 100) : 0;
  const verdict =
    pct >= 75 ? 'Solide. Pruefungsniveau in Sicht.' :
    pct >= 60 ? 'Auf gutem Weg. Wiederholen schadet nicht.' :
    pct >= 40 ? 'Noch Luft nach oben. Themen gezielt nacharbeiten.' :
                'Grundlage liegt. Stoff strukturiert wiederholen.';

  // Verlauf speichern
  const entry = {
    name: state.name,
    ts: Date.now(),
    score: state.score,
    answered: beantwortet,
    pct: pct,
    counts: counts,
  };
  const history = saveHistory(entry);

  // Bereich-Tabelle
  const bereichOrder = ['Perspective', 'People', 'Practice'];
  const bereichRows = bereichOrder
    .filter(b => bereichCounts[b])
    .map(b => {
      const bc = bereichCounts[b];
      const bPct = Math.round(bc.score / bc.gesamt * 100);
      return `<tr><td class="bereich">${b}</td><td class="num">${bc.score}</td><td class="num">${bc.gesamt}</td><td class="num">${bPct}%</td></tr>`;
    }).join('');

  // Verlauf-Liste (markiere aktuellen Eintrag)
  const verlaufItems = history.map((h, i) => {
    const isSelf = (i === 0);
    return `<li class="${isSelf ? 'self' : ''}">
      <span><span class="name-col">${escapeHtml(h.name)}</span><span class="meta-info">${fmtDate(h.ts)} · ${h.counts.correct} r / ${h.counts.wrong} f / ${h.counts.partial} t / ${h.counts.skipped} ü</span></span>
      <span class="score-col">${h.pct}%</span>
    </li>`;
  }).join('');

  endArea.style.display = 'block';
  endArea.innerHTML = `
    <div class="card end-screen">
      <h2>Auswertung</h2>
      <p class="name-out">fuer <strong>${escapeHtml(state.name)}</strong></p>
      <div class="score-big">${pct}%</div>
      <p class="verdict">${verdict}</p>

      <div class="result-grid">
        <div class="box correct"><div class="n">${counts.correct}</div><div class="l">Richtig</div></div>
        <div class="box partial"><div class="n">${counts.partial}</div><div class="l">Teilweise</div></div>
        <div class="box wrong"><div class="n">${counts.wrong}</div><div class="l">Falsch</div></div>
        <div class="box skip"><div class="n">${counts.skipped}</div><div class="l">Uebersprungen</div></div>
      </div>

      <div class="breakdown">
        <h3>Nach ICB4-Bereich</h3>
        <table>
          <thead><tr><th>Bereich</th><th class="num">Punkte</th><th class="num">Fragen</th><th class="num">%</th></tr></thead>
          <tbody>${bereichRows}</tbody>
        </table>
      </div>

      <div class="verlauf">
        <h3>Letzte Durchgaenge auf diesem Geraet <button class="clear-link" id="clear-history">Verlauf loeschen</button></h3>
        <ul class="verlauf-liste">${verlaufItems}</ul>
      </div>

      <div class="end-actions">
        <button class="btn" onclick="location.reload()">Naechster Teilnehmer</button>
      </div>
    </div>
  `;

  const clearBtn = $('clear-history');
  if (clearBtn) clearBtn.addEventListener('click', () => {
    if (confirm('Wirklich alle gespeicherten Durchgaenge auf diesem Geraet loeschen?')) {
      try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
      location.reload();
    }
  });
}

// Init
renderStart();
</script>
</body>
</html>
